apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agrobd-app-binding
  namespace: agrobd
subjects:
  - kind: ServiceAccount
    name: agrobd-service-account   # must match the SA name
    namespace: agrobd
roleRef:
  kind: Role
  name: agrobd-app-role            # must match the Role name above
  apiGroup: rbac.authorization.k8s.io
