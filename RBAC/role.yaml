apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agrobd-app-role
  namespace: agrobd
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]

  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]

  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
