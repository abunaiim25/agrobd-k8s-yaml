apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agrobd-hpa
  namespace: agrobd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agrobd
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: AverageValue
        averageValue: 800Mi